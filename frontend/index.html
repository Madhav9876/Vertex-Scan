<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vertex Scan - Web Security Scanner</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('vertexscan-theme') || 'system';
          var dark = t === 'dark' || (t === 'system' &&
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);
          var root = document.documentElement;
          root.classList.toggle('dark', !!dark);
          root.style.colorScheme = dark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
    <meta name="description" content="Vertex Scan - Professional web security scanning tool for HTTP headers, TLS/SSL, and directory enumeration." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
